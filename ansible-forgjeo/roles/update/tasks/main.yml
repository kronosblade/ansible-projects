---
- name: Update apt package cache
  apt:
    update_cache: yes

- name: Upgrade all installed packages (dist-upgrade)
  apt:
    upgrade: dist

- name: Remove packages that are no longer needed
  apt:
    autoremove: yes
    purge: yes

- name: Clean apt cache to free disk space
  apt:
    autoclean: yes

- name: Check if a reboot is required
  stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Notify if reboot is required
  debug:
    msg: "NOTICE: A reboot is required on {{ inventory_hostname }} to complete the update."
  when: reboot_required.stat.exists
