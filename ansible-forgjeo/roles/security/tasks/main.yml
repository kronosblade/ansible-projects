---
# --- fail2ban ---

- name: Install fail2ban
  apt:
    name: fail2ban
    state: present

- name: Deploy jail.local configuration
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban

- name: Enable and start fail2ban
  service:
    name: fail2ban
    state: started
    enabled: yes

- name: Check fail2ban status
  command: fail2ban-client status
  register: fail2ban_status
  changed_when: false

- name: Show fail2ban status
  debug:
    msg: "{{ fail2ban_status.stdout_lines }}"

# --- unattended-upgrades ---

- name: Install unattended-upgrades
  apt:
    name: unattended-upgrades
    state: present

- name: Enable unattended-upgrades via dpkg-reconfigure
  command: dpkg-reconfigure -plow unattended-upgrades
  environment:
    DEBIAN_FRONTEND: noninteractive
  changed_when: false

- name: Enable and start unattended-upgrades
  service:
    name: unattended-upgrades
    state: started
    enabled: yes

- name: Verify unattended-upgrades configuration
  command: apt-config dump APT::Periodic::Unattended-Upgrade
  register: unattended_status
  changed_when: false

- name: Show unattended-upgrades status
  debug:
    msg: "{{ unattended_status.stdout_lines }}"
