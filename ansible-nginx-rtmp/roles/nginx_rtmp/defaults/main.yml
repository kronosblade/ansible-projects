---
nginx_rtmp_user: nginx-rtmp
nginx_rtmp_group: nginx-rtmp
rtmp_port: 1935
http_port: 80
rtmp_app_name: stream
rtmp_chunk_size: 8192
rtmp_allow_cidr: ""
hls_enabled: true
hls_fragment: 2
hls_playlist_length: 10
hls_path: /tmp/hls
dash_enabled: false
dash_fragment: 2
dash_playlist_length: 10
dash_path: /tmp/dash
stat_enabled: true
